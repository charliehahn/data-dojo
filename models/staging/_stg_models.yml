version: 2

models:
  - name: stg_patients
    description: Cleaned and renamed patient records from seed data.
    columns:
      - name: patient_id
        description: Unique patient identifier.
        tests:
          - unique
          - not_null
      - name: full_name
        tests:
          - not_null
      - name: insurance_type
        tests:
          - accepted_values:
              values: ['commercial', 'medicaid', 'medicare']

  - name: stg_orders
    description: Cleaned and renamed order records from seed data.
    columns:
      - name: order_id
        description: Unique order identifier.
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_patients')
              field: patient_id
      - name: status
        tests:
          - accepted_values:
              values: ['delivered', 'cancelled', 'in_progress']
