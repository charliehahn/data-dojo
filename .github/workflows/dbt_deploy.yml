name: Deploy dbt to Snowflake (prod)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'models/**'
      - 'tests/**'
      - 'macros/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
      - 'packages.yml'
      - 'profiles.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install dbt-snowflake
          pipx install snowflake-cli

      - name: Install dbt packages
        run: dbt deps

      - name: Generate manifest (for slim CI)
        run: dbt parse --target prod

      - name: Configure Snowflake CLI
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/snowflake_rsa_key.p8
          chmod 600 /tmp/snowflake_rsa_key.p8
          printf '[connections.mwaa]\naccount = "ov77383.us-east-2.aws"\nuser = "MWAA_USER"\nauthenticator = "SNOWFLAKE_JWT"\nprivate_key_path = "/tmp/snowflake_rsa_key.p8"\nrole = "MWAA_ROLE"\nwarehouse = "TRANSFORMING"\ndatabase = "ANALYTICS"\n' > ~/.snowflake/config.toml
          chmod 0600 ~/.snowflake/config.toml

      - name: Deploy new version to Snowflake
        id: deploy
        run: |
          snow dbt deploy \
            --connection mwaa \
            ANALYTICS.CORE.DATA_DOJO_DBT

      - name: Upload manifest to stage for slim CI
        if: steps.deploy.outcome == 'success'
        run: |
          snow sql --connection mwaa \
            -q "PUT file://$(pwd)/target/manifest.json @ANALYTICS.CORE.DBT_MANIFEST_STAGE AUTO_COMPRESS=FALSE OVERWRITE=TRUE"

      - name: Log deploy to Snowflake
        if: always()
        run: |
          STATUS="${{ steps.deploy.outcome == 'success' && 'SUCCESS' || 'FAILED' }}"
          snow sql \
            --connection mwaa \
            -q "INSERT INTO ANALYTICS_DEV.DBT_DOJO.DBT_RUN_LOG
                  (run_id, project_name, command, status, started_at, finished_at, triggered_by)
                SELECT
                  UUID_STRING(),
                  'ANALYTICS.CORE.DATA_DOJO_DBT',
                  'deploy',
                  '$STATUS',
                  CURRENT_TIMESTAMP(),
                  CURRENT_TIMESTAMP(),
                  'CD - merge to main (${{ github.sha }})'
                );"
